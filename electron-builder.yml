appId: com.wechat.aibot
productName: 微信AI助手

directories:
  output: release

files:
  - src/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md}"
  - "!**/node_modules/*/{test,__tests__,tests,*.test.js}"

extraResources:
  - from: backend-dist/wechat-bot-backend/
    to: backend/
    filter:
      - "**/*"

win:
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64
  icon: src/assets/icon.ico
  publisherName: Dxj

portable:
  artifactName: "wechat-ai-assistant-portable-${version}-${arch}.${ext}"

nsis:
  artifactName: "wechat-ai-assistant-setup-${version}.${ext}"
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 微信AI助手
  installerLanguages:
    - zh_CN
  language: 2052

msi:
  artifactName: "wechat-ai-assistant-installer-${version}-${arch}.${ext}"

compression: maximum

publish:
  provider: github
  owner: byteD-x
  repo: wechat-bot
  releaseType: release
